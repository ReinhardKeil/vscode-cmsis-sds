name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  build-and-test:
    name: Build and Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            vsce_target: linux-x64
          - os: ubuntu-24.04-arm
            vsce_target: linux-arm64
          - os: windows-latest
            vsce_target: win32-x64
          - os: macos-latest
            vsce_target: darwin-arm64
    runs-on: ${{ matrix.os }}
    permissions:
      packages: read

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Configure git settings
        run: git config --global core.autocrlf false

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          node-version-file: package.json
          registry-url: https://npm.pkg.github.com
          package-manager-cache: false

      - name: Update current version
        if: runner.os == 'Linux' && github.repository_owner == 'Open-CMSIS-Pack'
        run: |
          DESCRIBE=$(git describe --tags --long --match 'v[0-9]*.[0-9]*.[0-9]*' 2>/dev/null || true)
          if [ -z "${DESCRIBE}" ]; then
            DESCRIBE=$(git describe --tags --long --match '[0-9]*.[0-9]*.[0-9]*' 2>/dev/null || true)
          fi
          echo "DESCRIBE: ${DESCRIBE}"
          if [ -z "${DESCRIBE}" ]; then
            echo "No semver tag matching vX.Y.Z or X.Y.Z found."
            exit 1
          fi
          BASE_TAG=$(printf '%s\n' "${DESCRIBE}" | grep -Eo '^v?[0-9]+\.[0-9]+\.[0-9]+' || true)
          if [ -z "${BASE_TAG}" ]; then
            echo "Failed to parse base version tag from DESCRIBE=${DESCRIBE}"
            exit 1
          fi
          BASE_VERSION="${BASE_TAG#v}"
          PR_QUALIFIER=$(printf '%s\n' "${DESCRIBE}" | grep -Eo '\-g[0-9a-f]+$' || true)
          BRANCH_QUALIFIER=$(printf '%s\n' "${DESCRIBE}" | grep -Eo '[0-9]+\-g[0-9a-f]+$' || true)
          SAFE_REF_NAME="${{ github.ref_name }}"
          SAFE_REF_NAME="${SAFE_REF_NAME//[^0-9A-Za-z-]/-}"

          case ${{ github.event_name }} in
            release)
              TAG="${{ github.event.release.tag_name }}"
              npm version --allow-same-version --no-git-tag-version --new-version "${TAG#v}"
              ;;
            pull_request)
              npm version -s --allow-same-version --no-git-tag-version --new-version "${BASE_VERSION}"
              PR_VERSION="${BASE_VERSION}-${{ github.event.number }}${PR_QUALIFIER}"
              npm version --allow-same-version --no-git-tag-version --new-version "${PR_VERSION}"
              echo "Prerelease version set succeeded"
              ;;
            *)
              npm version -s --allow-same-version --no-git-tag-version --new-version "${BASE_VERSION}"
              PR_VERSION="${BASE_VERSION}-${SAFE_REF_NAME}${BRANCH_QUALIFIER}"
              npm version --allow-same-version --no-git-tag-version --new-version "${PR_VERSION}"
              echo "Prerelease version set succeeded"
              ;;
          esac
          VERSION="$(jq -r ".version" < package.json)"
          sed -i "s/## Unreleased/## ${VERSION}/" CHANGELOG.md
          echo "Updated version to ${VERSION}"

      - name: Remove badges
        if: runner.os == 'Linux'
        run: |
          sed -i "/https:\/\/securityscorecards\.dev\/viewer/d" README.md
          sed -i "/https:\/\/img.shields.io\//d" README.md

      - name: Upload dist
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: dist
          path: |
            ./README.md
            ./package.json
            ./CHANGELOG.md
          retention-days: 1

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npm ci

      - name: Lint
        if: runner.os == 'Linux'
        run: npm run lint

      - name: Compile TypeScript
        run: npm run compile

      - name: Bundle extension (esbuild)
        run: npm run build

      - name: Check copyright
        run: npm run copyright:check

      - name: Run unit tests
        run: npm run test:unit

      - name: Run integration tests
        run: npm run test:integration

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Playwright Report
        if: always()
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        with:
          name: E2E Tests ${{ matrix.vsce_target }}
          path: e2e-report/results.xml
          reporter: java-junit

      - name: Upload E2E HTML report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-report-${{ matrix.vsce_target }}
          path: e2e-report

  package:
    needs: build-and-test
    strategy:
      fail-fast: true
      matrix:
        target:
          - win32-x64
          - linux-x64
          - linux-arm64
          - darwin-arm64
    runs-on: ubuntu-latest
    permissions:
      packages: read

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Configure git settings
        run: git config --global core.autocrlf false

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          node-version-file: package.json
          registry-url: https://npm.pkg.github.com
          package-manager-cache: false

      - name: Download dist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: .

      - name: Download tools
        run: |
          npm ci
          npm run download-tools -- --target ${{ matrix.target }} --no-cache

      - name: Package VSIX
        run: npm run package -- --target ${{ matrix.target }}

      - name: Upload VSIX package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vscode-cmsis-sds-${{ matrix.target }}
          path: ./*.vsix
          retention-days: 1

  publish:
    name: Publish release
    runs-on: [ubuntu-latest]
    if: github.event_name == 'release'
    needs: [ package ]
    permissions:
      # for softprops/action-gh-release to create a GitHub release
      contents: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Download packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: vscode-cmsis-sds-*

      - name: Attach packages
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            **/*.vsix
