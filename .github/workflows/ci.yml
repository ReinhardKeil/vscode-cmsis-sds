name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [20]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

      - name: Lint
        run: npm run lint

      - name: Run unit and integration tests
        run: npx vitest run

      - name: Install Playwright browsers
        if: always()
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        if: always()
        run: npm run test:e2e

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: test-results/
          retention-days: 30

  test-report:
    name: Test Report
    needs: build-and-test
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all test results
        if: always()
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Vitest Report (Ubuntu)
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: 'Unit & Integration Tests (ubuntu)'
          path: artifacts/test-results-ubuntu-latest/vitest-report.xml
          reporter: java-junit

      - name: Vitest Report (macOS)
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: 'Unit & Integration Tests (macos)'
          path: artifacts/test-results-macos-latest/vitest-report.xml
          reporter: java-junit

      - name: Vitest Report (Windows)
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: 'Unit & Integration Tests (windows)'
          path: artifacts/test-results-windows-latest/vitest-report.xml
          reporter: java-junit

      - name: Playwright Report (Ubuntu)
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: 'E2E Tests (ubuntu)'
          path: artifacts/test-results-ubuntu-latest/playwright-report.xml
          reporter: java-junit

      - name: Playwright Report (macOS)
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: 'E2E Tests (macos)'
          path: artifacts/test-results-macos-latest/playwright-report.xml
          reporter: java-junit

      - name: Playwright Report (Windows)
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: 'E2E Tests (windows)'
          path: artifacts/test-results-windows-latest/playwright-report.xml
          reporter: java-junit
