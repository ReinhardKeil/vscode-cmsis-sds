name: Nightly

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'  # nightly at 02:00 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  validate-links:
    if: github.repository == 'Open-CMSIS-Pack/vscode-cmsis-sds'
    name: Validate Markdown Links
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate Links
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: --config .github/lychee.toml './**/*.md'
          fail: true
          jobSummary: false

  build-and-test:
    if: github.repository == 'Open-CMSIS-Pack/vscode-cmsis-sds'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            vsce_target: linux-x64
          - os: ubuntu-24.04-arm
            vsce_target: linux-arm64
          - os: windows-latest
            vsce_target: win32-x64
          - os: macos-latest
            vsce_target: darwin-arm64
    runs-on: ${{ matrix.os }}
    permissions:
      packages: read
    name: Build and Test (${{ matrix.os }})

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Configure git settings
        run: git config --global core.autocrlf false

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          submodules: false
          token: ${{ github.token }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          node-version-file: package.json
          registry-url: https://npm.pkg.github.com
          package-manager-cache: false

      - name: Clean npm cache
        run: npm cache clean --force

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npm ci

      - name: Lint
        if: runner.os == 'Linux'
        run: npm run lint

      - name: Compile TypeScript
        run: npm run compile

      - name: Bundle extension (esbuild)
        run: npm run build

      - name: Update current version
        if: runner.os == 'Linux' && github.repository_owner == 'Open-CMSIS-Pack'
        run: |
          # Increment patch version by 1 (e.g. 1.64.1 -> 1.64.2)
          BASE_VERSION=$(node -p "require('./package.json').version.split('-')[0]")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"
          if [ -z "$MAJOR" ] || [ -z "$MINOR" ] || [ -z "$PATCH" ]; then
            echo "Invalid semver: $BASE_VERSION"
            exit 1
          fi
          if ! [[ "$MAJOR" =~ ^[0-9]+$ && "$MINOR" =~ ^[0-9]+$ && "$PATCH" =~ ^[0-9]+$ ]]; then
            echo "Invalid semver components (non-numeric): $BASE_VERSION (MAJOR=$MAJOR, MINOR=$MINOR, PATCH=$PATCH)"
            exit 1
          fi
          NEXT_PATCH_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"

          # Get commit count: since last tag if exists, otherwise total commits
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            COMMIT_COUNT=$(git rev-list --count HEAD ^${LAST_TAG})
          else
            COMMIT_COUNT=$(git rev-list --count HEAD)
          fi

          # Get short commit SHA
          SHORT_SHA=$(git rev-parse --short HEAD)

          # Create nightly version: 1.64.2-12-abc1234
          NIGHTLY_VERSION="${NEXT_PATCH_VERSION}-${COMMIT_COUNT}-${SHORT_SHA}"
          echo "Setting version to ${NIGHTLY_VERSION}"

          # Update package.json
          npm version "${NIGHTLY_VERSION}" --no-git-tag-version
          sed -i "s/## Unreleased/## ${VERSION}/" CHANGELOG.md
          echo "Version is ${NIGHTLY_VERSION}"

      - name: Remove badges
        if: runner.os == 'Linux'
        run: |
          sed -i "/https:\/\/securityscorecards\.dev\/viewer/d" README.md
          sed -i "/https:\/\/img.shields.io\//d" README.md

      - name: Upload dist
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: dist
          path: |
            ./README.md
            ./package.json
            ./CHANGELOG.md
          retention-days: 1

      - name: Run unit tests
        run: npm run test:unit

      - name: Run integration tests
        run: npm run test:integration

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Playwright Report
        if: always()
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        with:
          name: E2E Tests ${{ matrix.vsce_target }}
          path: e2e-report/results.xml
          reporter: java-junit

      - name: Upload E2E HTML report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-report-${{ matrix.vsce_target }}
          path: e2e-report

  package:
    needs: build-and-test
    strategy:
      fail-fast: true
      matrix:
        target:
          - win32-x64
          - linux-x64
          - linux-arm64
          - darwin-arm64
    runs-on: ubuntu-latest
    permissions:
      packages: read
      actions: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Configure git settings
        run: git config --global core.autocrlf false

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          node-version-file: package.json
          registry-url: https://npm.pkg.github.com
          package-manager-cache: false

      - name: Download dist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: .

      - name: Download tools
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm ci
          npm run download-tools:nightly -- --target ${{ matrix.target }} --no-cache

      - name: Package VSIX
        run: npm run package -- --target ${{ matrix.target }}

      - name: Upload VSIX package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vscode-cmsis-sds-${{ matrix.target }}
          path: ./*.vsix
          retention-days: 1
